name: Export Casimir searches

on:
  schedule:
    # 4 fois par jour : 00h, 06h, 12h, 18h (UTC)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  export-searches:
    runs-on: ubuntu-latest
    env:
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p data

      - name: Download searches snapshot from Streamlit app
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "ADMIN_TOKEN secret is not set; skipping export."
            exit 0
          fi
          TS=$(date -u +"%Y%m%d-%H%M%S")
          URL="https://mymairie-ksbry6thyvm8uddujy289c.streamlit.app/?admin=${ADMIN_TOKEN}&export_searches=1"
          echo "Fetching $URL"
          curl -fsSL "$URL" -o "data/searches-${TS}.txt"

      - name: Commit and push snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/searches-*.txt || true
          if git diff --cached --quiet; then
            echo "No new snapshots to commit."
            exit 0
          fi
          TS_COMMIT=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git commit -m "chore: snapshot searches ${TS_COMMIT}"
          git push

